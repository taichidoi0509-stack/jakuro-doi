<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d3b2e">
  <meta
    name="description"
    content="3人打ち・4人打ち対応の麻雀スコア・成績管理アプリ"
  >

  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">

  <title>雀録 | 麻雀成績管理</title>

  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand">
        <div class="brand-icon">中</div>

        <div>
          <p class="brand-label">MAHJONG SCORE</p>
          <h1>雀録</h1>
        </div>
      </div>

      <button id="installButton" class="install-button" hidden>
        アプリを追加
      </button>
    </header>

    <main class="main-content">
      <section class="hero-card">
        <p class="eyebrow">WELCOME TO JAKUROKU</p>

        <h2>
          仲間との麻雀を、<br>
          きちんと残す。
        </h2>

        <p>
          3人打ち・4人打ちの対局結果、収支、順位、役満を
          一つのグループで管理します。
        </p>

        <div class="hero-status">
          <span class="status-dot"></span>
          開発準備完了
        </div>
      </section>

      <section class="section-block">
        <div class="section-heading">
          <div>
            <p class="eyebrow">ROADMAP</p>
            <h2>実装予定</h2>
          </div>
        </div>

        <div class="feature-grid">
          <article class="feature-card">
            <span class="feature-number">01</span>
            <h3>グループ管理</h3>
            <p>仲間を招待し、グループごとに成績を管理します。</p>
          </article>

          <article class="feature-card">
            <span class="feature-number">02</span>
            <h3>対局入力</h3>
            <p>3人打ち・4人打ちの結果とチップを記録します。</p>
          </article>

          <article class="feature-card">
            <span class="feature-number">03</span>
            <h3>成績分析</h3>
            <p>収支、順位率、平均順位、対戦相手別成績を表示します。</p>
          </article>

          <article class="feature-card">
            <span class="feature-number">04</span>
            <h3>役満記録</h3>
            <p>役満達成時の演出と履歴を残します。</p>
          </article>
        </div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="メインメニュー">
      <button class="nav-item active" data-tab="home">
        <span>⌂</span>
        <small>ホーム</small>
      </button>

      <button class="nav-item" data-tab="game">
        <span>＋</span>
        <small>対局登録</small>
      </button>

      <button class="nav-item" data-tab="ranking">
        <span>♛</span>
        <small>ランキング</small>
      </button>

      <button class="nav-item" data-tab="settings">
        <span>⚙</span>
        <small>設定</small>
      </button>
    </nav>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./app.js"></script>
</body>
</html>
